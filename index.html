<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Score Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controls">
    <button onclick="resizeBoxes(-10)">Réduire</button>
    <button onclick="resizeBoxes(10)">Agrandir</button>
    <button onclick="toggleLayout()">Disposition</button>
    <button id="invertBtn" onclick="invertTimerDirection()">Mode: Chrono</button>
  </div>

  <div id="main-dashboard">
      
    <!-- ZONE ROLSKANET -->
    <div id="rolskanet-control" class="zone rolskanet-zone" style="width: 100%;">
      <h2 style="margin-bottom: 5px;">🌐 Synchro Rolskanet</h2>
      <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
        <textarea id="rolskanetId" placeholder="Lien du match (ex: 111483) ou code JSON (F12)" style="width: 300px; height: 40px; padding: 8px; border-radius: 4px; border: none; resize: vertical; font-family: sans-serif;"></textarea>
        <button class="action-btn" style="width: auto; padding: 8px 15px; font-size: 14px;" onclick="fetchRolskanetData()">⬇️ Importer Équipes & Compos</button>
      </div>
      <div style="margin-top: 8px;">
        <button class="blue-btn" style="width: 100%; font-size: 13px;" onclick="updatePublicStats()">🔄 Aspirer les Stats (Classement, Pointeurs, Direct)</button>
      </div>
      <div id="rolskanet-status" style="font-size: 12px; color: #aaa; margin-top: 5px;">En attente de lien ou de code...</div>
    </div>

    <!-- ZONE SCORE DOMICILE -->
    <div id="score-b-control" class="zone">
      <input type="text" id="domName" class="team-name-input" value="DOMICILE" onchange="updateTeamName('B', this.value)">
      <div class="controls">
        <button onclick="directChangeScore('B', -1)">−</button>
        <span id="scoreB">0</span>
        <button onclick="promptGoal('B')">+</button>
      </div>
      <div class="penalty-section">
        <h3>Pénalités</h3>
        <div class="penalty-buttons">
          <button onclick="promptPenalty('B', 2)">2 min</button>
          <button onclick="promptPenalty('B', 5)">5 min</button>
          <button onclick="promptPenalty('B', 10)">10 min</button>
        </div>
        <div class="penalty-timers" id="penaltiesB"></div>
      </div>
    </div>
    
    <!-- ZONE SCORE VISITEUR -->
    <div id="score-a-control" class="zone">
      <input type="text" id="visName" class="team-name-input" value="VISITEUR" onchange="updateTeamName('A', this.value)">
      <div class="controls">
        <button onclick="directChangeScore('A', -1)">−</button>
        <span id="scoreA">0</span>
        <button onclick="promptGoal('A')">+</button>
      </div>
      <div class="penalty-section">
        <h3>Pénalités</h3>
        <div class="penalty-buttons">
          <button onclick="promptPenalty('A', 2)">2 min</button>
          <button onclick="promptPenalty('A', 5)">5 min</button>
          <button onclick="promptPenalty('A', 10)">10 min</button>
        </div>
        <div class="penalty-timers" id="penaltiesA"></div>
      </div>
    </div>

    <!-- ZONE TEMPS -->
    <div id="timer-control" class="zone">
      <h2>Temps</h2>
      <div id="timer-inputs">
        <input type="number" id="timerMinutes" value="0" min="0" max="99" oninput="manualSetTime()">
        <span>:</span>
        <input type="number" id="timerSeconds" value="0" min="0" max="59" oninput="manualSetTime()">
      </div>
      
      <div class="adjust-buttons">
        <button onclick="adjustTimer(-60)">-1m</button>
        <button onclick="adjustTimer(-1)">-1s</button>
        <button onclick="adjustTimer(1)">+1s</button>
        <button onclick="adjustTimer(60)">+1m</button>
      </div>

      <div id="max-time-display">
        <span>Départ/Cible :</span>
        <input type="number" id="maxMinutes" value="20" min="0" max="99">
        <span>:</span>
        <input type="number" id="maxSeconds" value="0" min="0" max="59">
      </div>
      <div id="timer-buttons">
        <button id="playPauseBtn" onclick="toggleTimer()" class="start-btn">▶</button>
        <button onclick="resetTimer()" class="reset-btn">⟳</button>
        <button onclick="promptTimeout()" class="timeout-btn" title="Temps Mort">⏸️ TM</button>
      </div>
    </div>

    <!-- ZONE PÉRIODES -->
    <div id="period-control" class="zone">
      <h2>Périodes</h2>
      <div class="grid-3col">
        <button class="blue-btn" onclick="setPeriod(0)">Échauffement</button>
        <button class="blue-btn" onclick="setPeriod(1)">Période 1</button>
        <button class="blue-btn" onclick="setPeriod(2)">Mi-temps</button>
        <button class="blue-btn" onclick="setPeriod(3)">Période 2</button>
        <button class="blue-btn" onclick="setPeriod(4)">Prolongation</button>
        <button class="blue-btn" onclick="setPeriod(5)">Tirs au but</button>
      </div>
      <div style="margin-top: 5px; font-size: 14px; color:#aaa;">En cours : <span id="periodDisplay" style="color:white; font-weight:bold;">Échauffement</span></div>
    </div>

    <!-- ZONE SCÈNES OBS -->
    <div id="scene-control" class="zone">
      <h2>Scènes</h2>
      <div class="grid-2col">
        <button class="blue-btn" onclick="switchScene(sourceNames.sceneName)">Live</button>
        <button class="blue-btn" onclick="switchScene(sourceNames.compoScene)">Composition</button>
        <button class="blue-btn" onclick="switchScene(sourceNames.miTempsScene)">Mi-temps</button>
        <button class="blue-btn" onclick="switchScene(sourceNames.finMatchScene)">Fin de match</button>
      </div>
    </div>

    <!-- ZONE AFFICHAGE GRAPHICS (5s) -->
    <div id="graphic-control" class="zone">
      <h2>Affichage (5 sec)</h2>
      <div class="grid-2col">
        <button class="blue-btn" onclick="triggerGraphic(sourceNames.overlayReseaux)">Réseaux</button>
        <button class="blue-btn" onclick="triggerGraphic(sourceNames.overlayClassement)">TOP 5 Classement</button>
        <button class="blue-btn" onclick="triggerGraphic(sourceNames.overlayPointeurs)">TOP 5 Pointeurs</button>
        <button class="blue-btn" onclick="triggerGraphic(sourceNames.overlayAutresScores)">Matchs en direct</button>
      </div>
    </div>

    <!-- ZONE REPLAY -->
    <div id="replay-control" class="zone replay-zone">
      <h2>Régie Replay</h2>
      <button id="toggleReplayBtn" class="start-btn" onclick="toggleReplayBuffer()">▶️ Activer le Replay Buffer</button>
      
      <div id="replay-content" class="replay-content-hidden">
        <button id="saveReplayBtn" class="action-btn" onclick="saveReplay()">📸 Capturer l'action !</button>
        <div class="replay-status">Vidéos prêtes : <span id="replayCount" class="badge">0</span></div>
        <div class="replay-buttons-grid">
          <button class="play-btn" onclick="playLastReplay()">⏪ Revoir le dernier</button>
          <button class="play-all-btn" onclick="playAllReplays()">🎞️ Revoir tout</button>
          <button class="stop-btn" onclick="hideReplayOnStream()">❌ Forcer l'arrêt</button>
          <button id="deleteBtn" class="delete-btn" onclick="clearReplays()">🗑️ Vider la liste</button>
        </div>
        <div style="margin-top: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px;">
          <label style="cursor: pointer; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <input type="checkbox" id="loopReplaysCheckbox" style="width: 18px; height: 18px; cursor: pointer;"> 
            🔁 Boucler "Revoir tout"
          </label>
        </div>
      </div>
    </div>

  </div>

  <!-- FENÊTRE MODALE POUR LE CHOIX DU JOUEUR / TEMPS MORT -->
  <div id="player-modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title">Sélectionnez le joueur</h3>
      <div id="player-grid" class="player-grid"></div>
      <button class="modal-close-btn" onclick="closePlayerModal()">Annuler</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
